  <style>
    :root {
      --hw-blue: #0066ff;
      --hw-orange: #ff6b00;
      --mt-green: #39ff14;
      --mt-mud: #3d2817;
    }

    html, body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background-color: #fff3d6;
      background-image:
        radial-gradient(at 10% 0%, #ffd580 0px, transparent 50%),
        radial-gradient(at 90% 10%, #c2f0ff 0px, transparent 50%),
        radial-gradient(at 50% 100%, #ffe3a0 0px, transparent 50%);
      min-height: 100vh;
    }

    /* Полупрозрачная асфальтовая текстура поверх фона */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
      background-image:
        linear-gradient(45deg, rgba(0, 0, 0, 0.2) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(0, 0, 0, 0.2) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(0, 0, 0, 0.2) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(0, 0, 0, 0.2) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }

    #root { position: relative; z-index: 1; }

    /* Хром для логотипа */
    .chrome-text {
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #e9ecef 22%,
        #adb5bd 46%,
        #495057 54%,
        #adb5bd 66%,
        #ffffff 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter:
        drop-shadow(0 3px 0 #0066ff)
        drop-shadow(0 6px 0 #003a99)
        drop-shadow(0 10px 14px rgba(0, 0, 0, 0.35));
      letter-spacing: 0.05em;
    }

    .dima-handwriting {
      font-family: 'Caveat', cursive;
      color: #e11d48;
      text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.1);
    }

    .bangers { font-family: 'Bangers', 'Nunito', sans-serif; letter-spacing: 0.06em; }
    .fredoka { font-family: 'Fredoka', 'Nunito', sans-serif; }

    /* Пульсация для кнопок-подсказок */
    @keyframes bouncy {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }
    .bouncy { animation: bouncy 1.4s ease-in-out infinite; }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .wiggle { animation: wiggle 2s ease-in-out infinite; }

    @keyframes shine {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shine {
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
      );
      background-size: 200% 100%;
      animation: shine 3s linear infinite;
    }

    /* Карточка — тень и hover */
    .toy-card {
      transition: transform 0.25s cubic-bezier(.2,.8,.2,1.4), box-shadow 0.25s ease;
      will-change: transform;
    }
    .toy-card:hover {
      transform: translateY(-10px) rotate(-1deg) scale(1.03);
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .toy-card:active {
      transform: translateY(-2px) scale(0.97);
    }

    /* Гоночная полоса Hot Wheels */
    .race-stripe {
      background-image: repeating-linear-gradient(
        90deg,
        #fff 0 14px,
        #ff6b00 14px 28px,
        #0066ff 28px 42px
      );
    }

    /* Грязь для Monster Trucks */
    .mud-stripe {
      background-image:
        radial-gradient(circle at 10% 40%, #5a3820 4px, transparent 5px),
        radial-gradient(circle at 30% 70%, #3d2817 6px, transparent 7px),
        radial-gradient(circle at 55% 30%, #5a3820 5px, transparent 6px),
        radial-gradient(circle at 80% 60%, #3d2817 7px, transparent 8px),
        linear-gradient(90deg, #2a1a0e, #3d2817);
    }

    /* Кнопки-фильтры */
    .filter-btn {
      min-width: 64px;
      min-height: 64px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }
    .filter-btn:active { transform: scale(0.94); }

    /* Скролл-бар стилизуем мягко */
    ::-webkit-scrollbar { width: 14px; height: 14px; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#ff6b00, #0066ff);
      border-radius: 10px;
      border: 3px solid #fff3d6;
    }

    /* Эмодзи машинки */
    .toy-emoji {
      font-size: 5.5rem;
      line-height: 1;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.25));
    }

    /* Подпись Димы — как бы на бумажке */
    .dima-note {
      background: #fffbea;
      padding: 8px 16px;
      border-radius: 8px;
      transform: rotate(-4deg);
      box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
      border: 1px dashed rgba(0,0,0,0.1);
    }

    /* Чтобы textUppercase на кириллице выглядел ровно */
    .uppercase-ru { text-transform: uppercase; }

    /* Фото-рамка на кнопках-фильтрах (Hot Wheels / Monster Trucks) */
    .filter-photo {
      width: 96px;
      height: 64px;
    }
    .filter-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @media (min-width: 480px) {
      .filter-photo {
        width: 120px;
        height: 80px;
      }
    }
    @media (min-width: 768px) {
      .filter-photo {
        width: 180px;
        height: 120px;
      }
    }

    /* Текст фильтра — адаптивный, влезает на iPhone и красиво растёт на планшете */
    .filter-label {
      font-size: clamp(1.4rem, 6.5vw, 3.75rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    /* На узких мобильных разрешаем перенос, если два слова всё же не влезут */
    @media (max-width: 400px) {
      .filter-label {
        white-space: normal;
        font-size: clamp(1.25rem, 7.5vw, 1.75rem);
      }
    }
  </style>

    /* =========================================================================
       ИКОНКА MONSTER TRUCKS — грузовик на огромных колёсах + брызги грязи.
       ========================================================================= */
    function MonsterTruckIcon({ size = 70 }) {
      return (
        <svg viewBox="0 0 140 95" width={size} height={size * 95 / 140} aria-hidden="true">
          {/* Кабина */}
          <rect x="38" y="14" width="48" height="24" rx="3" fill="#39ff14" stroke="#000" strokeWidth="2" />
          {/* Окно кабины */}
          <rect x="43" y="18" width="38" height="16" rx="2" fill="#1a1a1a" />
          <rect x="45" y="20" width="12" height="6" fill="#fff" opacity="0.4" />

          {/* Кузов */}
          <rect x="22" y="34" width="94" height="26" rx="3" fill="#39ff14" stroke="#000" strokeWidth="2" />
          {/* Выхлопные трубы */}
          <rect x="46" y="6" width="5" height="12" fill="#888" stroke="#000" strokeWidth="1" />
          <rect x="54" y="6" width="5" height="12" fill="#888" stroke="#000" strokeWidth="1" />

          {/* Фары */}
          <circle cx="110" cy="42" r="3" fill="#ffcc00" stroke="#000" strokeWidth="1" />
          <circle cx="110" cy="52" r="3" fill="#ffcc00" stroke="#000" strokeWidth="1" />

          {/* ОГРОМНЫЕ колёса */}
          <circle cx="32" cy="70" r="22" fill="#1a1a1a" />
          <circle cx="108" cy="70" r="22" fill="#1a1a1a" />
          {/* Обод серый */}
          <circle cx="32" cy="70" r="11" fill="#666" stroke="#000" strokeWidth="1" />
          <circle cx="108" cy="70" r="11" fill="#666" stroke="#000" strokeWidth="1" />
          {/* Центр */}
          <circle cx="32" cy="70" r="4" fill="#39ff14" />
          <circle cx="108" cy="70" r="4" fill="#39ff14" />

          {/* Крупный протектор */}
          <g stroke="#333" strokeWidth="2.5">
            <line x1="32" y1="48" x2="32" y2="53" />
            <line x1="32" y1="87" x2="32" y2="92" />
            <line x1="10" y1="70" x2="15" y2="70" />
            <line x1="49" y1="70" x2="54" y2="70" />
            <line x1="47" y1="55" x2="51" y2="58" />
            <line x1="13" y1="55" x2="17" y2="58" />
            <line x1="108" y1="48" x2="108" y2="53" />
            <line x1="108" y1="87" x2="108" y2="92" />
            <line x1="86" y1="70" x2="91" y2="70" />
            <line x1="125" y1="70" x2="130" y2="70" />
            <line x1="123" y1="55" x2="127" y2="58" />
            <line x1="89" y1="55" x2="93" y2="58" />
          </g>

          {/* Брызги грязи */}
          <circle cx="6" cy="88" r="3" fill="#3d2817" />
          <circle cx="14" cy="93" r="2" fill="#5a3820" />
          <circle cx="132" cy="88" r="2.5" fill="#3d2817" />
          <circle cx="62" cy="92" r="2" fill="#3d2817" />
          <circle cx="78" cy="90" r="2" fill="#5a3820" />
        </svg>
      );
    }

    /* =========================================================================
       ИКОНКА МАГАЗИНА (Ozon / WB / Яндекс Маркет) — маленькая «пилюля».
       ========================================================================= */
    function StoreBadge({ store }) {
      const map = {
        ozon:        { label: 'Ozon',    bg: '#005BFF', color: '#fff' },
        wildberries: { label: 'WB',      bg: '#CB11AB', color: '#fff' },
        yandex:      { label: 'Маркет',  bg: '#FFCC00', color: '#1a1a1a' },
      };
      const s = map[store];
      return (
        <div
          className="flex items-center gap-1 px-4 py-2 rounded-2xl text-lg font-black shadow-md"
          style={{ background: s.bg, color: s.color }}
        >
          <span>🛒</span>
          <span>{s.label}</span>
        </div>
      );
    }

    /* =========================================================================
       КАРТОЧКА ИГРУШКИ — вся карточка кликабельна (как попросил Дима).
       Открывается в новой вкладке, rel="noopener noreferrer".
       ========================================================================= */
    function ToyCard({ toy }) {
      const handleOpen = (e) => {
        // Подстраховка: принудительно открываем магазин в новой вкладке.
        // Нужна, потому что внутри sandbox-iframe (например, в превью-панелях)
        // обычный target="_blank" может блокироваться.
        e.preventDefault();
        const w = window.open(toy.link, '_blank', 'noopener,noreferrer');
        // Если popup-blocker не дал открыть — переходим в текущей вкладке.
        if (!w) window.location.href = toy.link;
      };
      return (
        <a
          href={toy.link}
          target="_blank"
          rel="noopener noreferrer"
          onClick={handleOpen}
          className="toy-card block bg-white rounded-[30px] overflow-hidden shadow-xl border-4 border-white focus:outline-none focus:ring-8 focus:ring-yellow-300"
          aria-label={`Открыть ${toy.name} в магазине ${toy.store}`}
        >
          {/* Верх карточки — картинка */}
          <div
            className="relative flex items-center justify-center"
            style={{ background: toy.bg, minHeight: '170px' }}
          >
            <div className="toy-emoji wiggle select-none" aria-hidden="true">
              {toy.emoji}
            </div>
            {/* «Блик» на глянце */}
            <div className="absolute inset-0 pointer-events-none shine" />
            {/* Иконка магазина в правом верхнем углу */}
            <div className="absolute top-3 right-3">
              <StoreBadge store={toy.store} />
            </div>
          </div>

          {/* Низ карточки — текст */}
          <div className="p-4 flex flex-col gap-3 bg-white">
            <h3 className="bangers text-3xl md:text-4xl text-gray-900 leading-tight">
              {toy.name}
            </h3>

            <div
              className="bouncy inline-flex items-center justify-center self-start gap-2 rounded-2xl px-5 py-3 text-white text-xl md:text-2xl font-black uppercase-ru shadow-lg"
              style={{ background: 'linear-gradient(135deg,#ff6b00,#e11d48)' }}
            >
              <span>КУПИТЬ ТУТ</span>
              <span className="text-2xl">👉</span>
            </div>
          </div>
        </a>
      );
    }

    /* =========================================================================
       КНОПКА-ФИЛЬТР (таблетка).
       ========================================================================= */
    function FilterPill({ active, onClick, kind }) {
      const common =
        'filter-btn rounded-[40px] border-4 shadow-2xl flex items-center gap-2 sm:gap-3 md:gap-4 ' +
        'px-3 sm:px-4 md:px-6 py-2 sm:py-3 md:py-4 transition-all max-w-full';

      // Большая рамка для фото
      const photoWrap = {
        borderRadius: '24px',
        overflow: 'hidden',
        flexShrink: 0,
        border: '3px solid #fff',
        boxShadow: '0 6px 16px rgba(0,0,0,0.35)',
      };

      if (kind === 'hotwheels') {
        return (
          <button
            onClick={onClick}
            className={[
              common,
              active
                ? 'race-stripe border-white scale-105'
                : 'bg-white border-red-400 opacity-85 hover:opacity-100',
            ].join(' ')}
            aria-pressed={active}
            aria-label="Показать Хот Вилс"
          >
            <div className="filter-photo" style={photoWrap}>
              <img
                src="img/hotwheels.jpg"
                alt="Hot Wheels car"
                style={{ display: 'block', objectFit: 'cover' }}
              />
            </div>
            <span
              className="bangers filter-label"
              style={{
                color: active ? '#ffcc00' : '#e11d48',
                WebkitTextStroke: active ? '2px #000' : '0',
                textShadow: active
                  ? '3px 3px 0 #000, 0 0 18px rgba(255,107,0,0.9)'
                  : '3px 3px 0 #ffcc00, 4px 4px 0 #000',
                fontStyle: 'italic',
                transform: 'skewX(-8deg)',
                display: 'inline-block',
              }}
            >
              ХОТ ВИЛС
            </span>
          </button>
        );
      }

      // MONSTER TRUCKS
      return (
        <button
          onClick={onClick}
          className={[
            common,
            active
              ? 'mud-stripe border-white scale-105'
              : 'bg-white border-green-500 opacity-85 hover:opacity-100',
          ].join(' ')}
          aria-pressed={active}
          aria-label="Показать Монстр Траки"
        >
          <div className="filter-photo" style={photoWrap}>
            <img
              src="img/monstertrucks.jpg"
              alt="Monster Truck Grave Digger"
              style={{ display: 'block', objectFit: 'cover' }}
            />
          </div>
          <span
            className="bangers filter-label"
            style={{
              color: active ? '#39ff14' : '#0f3d1f',
              WebkitTextStroke: active ? '2px #000' : '0',
              textShadow: active
                ? '3px 3px 0 #000, 0 0 18px rgba(57,255,20,0.8)'
                : '3px 3px 0 #39ff14, 4px 4px 0 #000',
              display: 'inline-block',
            }}
          >
            МОНСТР ТРАКИ
          </span>
        </button>
      );
    }

    /* =========================================================================
       ШАПКА.
       ========================================================================= */
    function Header({ category, setCategory, count }) {
      return (
        <header className="relative overflow-hidden border-b-8 border-red-500 shadow-2xl">
          <div
            className="absolute inset-0"
            style={{
              background:
                'linear-gradient(180deg,#FFD95B 0%,#FFB347 60%,#FF7E47 100%)',
            }}
          />
          {/* Гоночная полоса сверху */}
          <div className="absolute top-0 left-0 right-0 h-3 race-stripe" />

          <div className="relative max-w-7xl mx-auto px-4 md:px-8 pt-10 pb-6">
            <div className="flex flex-col md:flex-row items-end justify-center gap-4 md:gap-8">
              <BearLogo size={220} />

              <div className="flex flex-col items-center md:items-start pb-4">
                <h1
                  className="chrome-text fredoka text-6xl md:text-8xl font-black leading-none"
                  aria-label="Медведь"
                >
                  МЕДВЕДЬ
                </h1>
                <div className="mt-3 dima-note">
                  <span className="dima-handwriting text-2xl md:text-3xl">
                    ✏️ Собрал Дима, 6 лет
                  </span>
                </div>
              </div>
            </div>

            {/* Фильтры */}
            <div className="mt-8 flex flex-wrap justify-center gap-4 md:gap-6">
              <FilterPill
                active={category === 'hotwheels'}
                onClick={() => setCategory('hotwheels')}
                kind="hotwheels"
              />
              <FilterPill
                active={category === 'monster'}
                onClick={() => setCategory('monster')}
                kind="monster"
              />
            </div>

            {/* Счётчик */}
            <div className="mt-5 flex justify-center">
              <div
                className="bangers text-2xl md:text-3xl px-6 py-2 rounded-full bg-white/90 shadow-lg border-4 border-yellow-400"
                style={{ color: '#0066ff' }}
              >
                🏁 Машинок: {count}
              </div>
            </div>
          </div>
        </header>
      );
    }

    /* =========================================================================
       ПОДВАЛ.
       ========================================================================= */
    function Footer() {
      return (
        <footer className="mt-12 py-8 text-center">
          <div className="inline-flex items-center gap-3 bg-white/80 rounded-full px-6 py-3 shadow-md border-4 border-dashed border-orange-400">
            <span className="text-3xl">🐻</span>
            <span className="dima-handwriting text-2xl md:text-3xl">
              Мой сайт про машинки!
            </span>
            <span className="text-3xl">🏎️</span>
          </div>
          <p className="mt-4 text-sm text-gray-600 fredoka">
            © Дима и папа. Все машинки — понарошку, но настоящие в магазинах!
          </p>
        </footer>
      );
    }

    /* =========================================================================
       ГЛАВНЫЙ КОМПОНЕНТ.
       ========================================================================= */
    function App() {
      const [category, setCategory] = useState('hotwheels');
      const filtered = useMemo(
        () => TOYS.filter((t) => t.category === category),
        [category]
      );

      return (
        <div className="min-h-screen">
          <Header
            category={category}
            setCategory={setCategory}
            count={filtered.length}
          />

          <main className="max-w-7xl mx-auto px-4 md:px-8 py-8">
            <div
              className="grid gap-5 md:gap-7"
              style={{
                gridTemplateColumns:
                  'repeat(auto-fill, minmax(260px, 1fr))',
              }}
            >
              {filtered.map((toy) => (
                <ToyCard key={toy.id} toy={toy} />
              ))}
            </div>
          </main>

          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
