<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- фон — кружок жёлтый как у Hot Wheels -->
  <circle cx="50" cy="50" r="49" fill="#ffcc00"/>
  <circle cx="50" cy="50" r="49" fill="none" stroke="#000" stroke-width="2"/>

  <!-- уши -->
  <circle cx="26" cy="35" r="11" fill="#8B4513"/>
  <circle cx="74" cy="35" r="11" fill="#8B4513"/>
  <circle cx="26" cy="35" r="6" fill="#D2691E"/>
  <circle cx="74" cy="35" r="6" fill="#D2691E"/>

  <!-- голова -->
  <circle cx="50" cy="55" r="30" fill="#A0522D"/>
  <circle cx="50" cy="57" r="26" fill="#8B4513"/>

  <!-- мордочка -->
  <ellipse cx="50" cy="66" rx="15" ry="11" fill="#F4D8A8"/>
  <ellipse cx="50" cy="62" rx="3.5" ry="2.5" fill="#2b1810"/>

  <!-- щёки -->
  <ellipse cx="33" cy="66" rx="4" ry="2.5" fill="#ff8aa5" opacity="0.7"/>
  <ellipse cx="67" cy="66" rx="4" ry="2.5" fill="#ff8aa5" opacity="0.7"/>

  <!-- глаза -->
  <circle cx="40" cy="52" r="4" fill="#fff"/>
  <circle cx="60" cy="52" r="4" fill="#fff"/>
  <circle cx="41" cy="53" r="2.3" fill="#1a1a1a"/>
  <circle cx="61" cy="53" r="2.3" fill="#1a1a1a"/>
  <circle cx="42" cy="52" r="1" fill="#fff"/>
  <circle cx="62" cy="52" r="1" fill="#fff"/>

  <!-- улыбка -->
  <path d="M 42 73 Q 50 80 58 73" stroke="#2b1810" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- красный шлем сверху -->
  <path d="M 18 42 Q 18 14 50 9 Q 82 14 82 42 L 82 46 L 18 46 Z" fill="#e11d48"/>
  <!-- чёрная низ шлема -->
  <rect x="18" y="46" width="64" height="4" fill="#1a1a1a"/>

  <!-- шашечная финишная полоса -->
  <rect x="18" y="28" width="64" height="8" fill="#fff"/>
  <rect x="18" y="28" width="6" height="4" fill="#000"/>
  <rect x="30" y="28" width="6" height="4" fill="#000"/>
  <rect x="42" y="28" width="6" height="4" fill="#000"/>
  <rect x="54" y="28" width="6" height="4" fill="#000"/>
  <rect x="66" y="28" width="6" height="4" fill="#000"/>
  <rect x="24" y="32" width="6" height="4" fill="#000"/>
  <rect x="36" y="32" width="6" height="4" fill="#000"/>
  <rect x="48" y="32" width="6" height="4" fill="#000"/>
  <rect x="60" y="32" width="6" height="4" fill="#000"/>
  <rect x="72" y="32" width="6" height="4" fill="#000"/>

  <!-- блик на шлеме -->
  <ellipse cx="32" cy="22" rx="10" ry="4" fill="rgba(255,255,255,0.5)"/>
