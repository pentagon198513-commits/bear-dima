<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FF6B00" />
  <title>♟ Шахматы — Медведь</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game.css" />
  <script src="sounds.js" defer></script>
  <script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <script src="multiplayer.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    .lobby{text-align:center;padding:16px}
    .lobby h2{font-family:'Bangers',sans-serif;font-size:clamp(1.4rem,5vw,2.2rem);color:var(--hw-red);margin:8px 0}
    .lobby p{font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(.9rem,3vw,1.1rem);color:#333;margin:6px 0}
    .lobby-btn{display:inline-block;margin:8px 6px;padding:14px 22px;min-height:56px;background:linear-gradient(135deg,var(--hw-orange),var(--hw-red));border:4px solid #fff;border-radius:24px;color:#fff;font-family:'Bangers',sans-serif;font-size:clamp(1.1rem,3.5vw,1.4rem);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);transition:transform .15s}
    .lobby-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
    .lobby-btn.green{background:linear-gradient(135deg,#39ff14,#0d7a00)}
    .lobby-btn.gray{background:linear-gradient(135deg,#888,#555)}
    .lobby-btn.blue{background:linear-gradient(135deg,#0066ff,#00c6ff)}
    .code-display{font-family:'Bangers',sans-serif;font-size:clamp(2rem,8vw,3.5rem);color:var(--hw-blue);letter-spacing:.15em;background:#fff;border:4px solid var(--hw-blue);border-radius:16px;padding:10px 24px;display:inline-block;margin:12px 0;user-select:all}
    .code-input{font-family:'Bangers',sans-serif;font-size:clamp(1.5rem,6vw,2.5rem);text-align:center;letter-spacing:.15em;border:4px solid var(--hw-blue);border-radius:16px;padding:10px 20px;width:180px;outline:none;color:var(--hw-blue)}
    .code-input:focus{border-color:var(--hw-orange)}
    .or-divider{font-family:'Nunito',sans-serif;font-weight:900;color:#999;font-size:1rem;margin:8px 0}
    .waiting{animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
    .howto{background:#fff;border-radius:16px;padding:12px 16px;margin:10px auto;max-width:340px;text-align:left;border:3px solid #ffcc00;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .howto p{margin:0 0 4px;font-size:.9rem}.howto b{color:var(--hw-red)}
    .status-bar{text-align:center;font-family:'Bangers',sans-serif;font-size:clamp(1rem,3.5vw,1.5rem);padding:8px;color:#fff;text-shadow:2px 2px 0 #000}
    .chess-wrap{display:flex;flex-direction:column;align-items:center;padding:8px}
    .chess-board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:min(92vw,440px);height:min(92vw,440px);border:4px solid #5d3a1a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.35);overflow:hidden}
    .sq{display:flex;align-items:center;justify-content:center;font-size:clamp(1.8rem,8vw,3.2rem);cursor:pointer;user-select:none;position:relative;transition:background .15s;overflow:hidden}
    .sq-light{background:#f0d9b5}
    .sq-dark{background:#b58863}
    .sq.selected{background:#ffcc00!important;box-shadow:inset 0 0 12px rgba(255,204,0,.8)}
    .sq.possible{position:relative}
    .sq.possible::after{content:'';position:absolute;width:30%;height:30%;background:rgba(0,0,0,.25);border-radius:50%}
    .sq.last-move{background:rgba(255,204,0,.4)!important}
    .sq.check{background:#ff4444!important}
    .piece{filter:drop-shadow(1px 1px 1px rgba(0,0,0,.4));line-height:1;pointer-events:none}
    .captured{display:flex;flex-wrap:wrap;gap:2px;padding:4px 8px;height:36px;font-size:clamp(1rem,3.5vw,1.5rem);background:rgba(0,0,0,.1);border-radius:8px;margin:4px 0;width:min(92vw,440px);overflow:hidden;align-items:center}
  </style>
</head>
<body>
  <header class="game-header">
    <a href="../" class="back-btn"><span>←</span><span>НАЗАД</span></a>
    <h1 class="game-title">♟ ШАХМАТЫ</h1>
    <div class="sound-toggles">
      <button class="sound-btn" id="sfxBtn">🔊</button>
      <button class="sound-btn" id="musBtn">🎵</button>
    </div>
  </header>

  <div id="lobby" class="lobby">
    <h2>♟ ШАХМАТЫ</h2>
    <div class="howto">
      <p><b>Онлайн (2 устройства):</b></p>
      <p>1️⃣ Игрок 1 → <b>«Создать»</b> → 4 цифры</p>
      <p>2️⃣ Игрок 2 → вводит цифры → <b>«Подключиться»</b></p>
    </div>
    <button class="lobby-btn" onclick="createRoom()">🏠 СОЗДАТЬ ИГРУ</button>
    <div class="or-divider">— ИЛИ —</div>
    <p>Введи 4 цифры от друга:</p>
    <input class="code-input" id="joinCode" maxlength="4" placeholder="1234" inputmode="numeric" pattern="[0-9]*" />
    <br /><button class="lobby-btn green" onclick="joinRoom()">🚀 ПОДКЛЮЧИТЬСЯ</button>
    <div class="or-divider">— ИЛИ —</div>
    <button class="lobby-btn blue" onclick="startLocal()">🤝 ВДВОЁМ НА ОДНОМ</button>
    <button class="lobby-btn gray" onclick="startBot()">🤖 С БОТОМ</button>
    <div id="connStatus"></div>
  </div>

  <div id="gameView" style="display:none;">
    <div class="status-bar" id="status">Ожидание...</div>
    <div class="chess-wrap">
      <div class="captured" id="capturedTop"></div>
      <div class="chess-board" id="board"></div>
      <div class="captured" id="capturedBottom"></div>
    </div>
  </div>

  <div class="win-modal" id="winModal">
    <div class="win-box">
      <h2 class="win-title" id="winTitle">♟ РЕЗУЛЬТАТ</h2>
      <div class="win-stat" id="winStat"></div>
      <button class="win-btn" onclick="restart()">🔁 НОВАЯ ПАРТИЯ</button><br />
      <a href="../" class="win-btn" style="margin-top:10px;">🏠 ДОМОЙ</a>
    </div>
  </div>

  <script>
    const PIECES = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'};
    function pieceChar(p) {
      if (!p) return '';
      const key = p.color === 'w' ? p.type.toUpperCase() : p.type;
      return PIECES[key] || '';
    }

    let game = new Chess();
    let mode = ''; // 'online','bot','local'
    let myColor = 'w';
    let selected = null; // {row,col}
    let possibleMoves = [];
    let lastMove = null; // {from, to}
    let flipped = false;
    let capturedW = [], capturedB = [];

    function showGame() {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('gameView').style.display = 'block';
      renderBoard(); updateStatus();
    }

    function isMyTurn() {
      if (mode === 'local') return true;
      return game.turn() === myColor;
    }

    function updateStatus() {
      const el = document.getElementById('status');
      el.classList.remove('waiting');
      if (game.in_checkmate()) {
        const winner = game.turn() === 'w' ? 'Чёрные' : 'Белые';
        el.textContent = `♔ МАТ! ${winner} победили!`;
        el.style.color = '#ff4444';
        endGame();
        return;
      }
      if (game.in_stalemate() || game.in_draw()) {
        el.textContent = '🤝 НИЧЬЯ!';
        el.style.color = '#ffcc00';
        endGame();
        return;
      }
      if (game.in_check()) {
        el.textContent = '⚠️ ШАХ!';
        el.style.color = '#ff4444';
      } else if (mode === 'local') {
        el.textContent = `Ход: ${game.turn() === 'w' ? '⬜ Белые' : '⬛ Чёрные'}`;
        el.style.color = '#39ff14';
      } else if (isMyTurn()) {
        el.textContent = `Твой ход! (${myColor === 'w' ? '⬜ Белые' : '⬛ Чёрные'})`;
        el.style.color = '#39ff14';
      } else {
        el.textContent = mode === 'bot' ? '🤖 Бот думает...' : '⏳ Ход соперника...';
        el.style.color = '#ffcc00';
        el.classList.add('waiting');
      }
    }

    function renderBoard() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      const b = game.board();
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const row = flipped ? 7 - r : r;
          const col = flipped ? 7 - c : c;
          const sq = document.createElement('div');
          const isLight = (row + col) % 2 === 0;
          let cls = 'sq ' + (isLight ? 'sq-light' : 'sq-dark');
          // Подсветка
          if (selected && selected.row === row && selected.col === col) cls += ' selected';
          if (lastMove) {
            const fromSq = sqName(lastMove.from);
            const toSq = sqName(lastMove.to);
            const thisSq = String.fromCharCode(97 + col) + (8 - row);
            if (thisSq === fromSq || thisSq === toSq) cls += ' last-move';
          }
          if (possibleMoves.some(m => {
            const to = m.to;
            return to === String.fromCharCode(97 + col) + (8 - row);
          })) cls += ' possible';
          // Шах
          if (game.in_check() && b[row][col] && b[row][col].type === 'k' && b[row][col].color === game.turn()) {
            cls += ' check';
          }
          sq.className = cls;
          const piece = b[row][col];
          if (piece) {
            const span = document.createElement('span');
            span.className = 'piece';
            span.textContent = pieceChar(piece);
            sq.appendChild(span);
          }
          sq.onclick = () => onSquareClick(row, col);
          el.appendChild(sq);
        }
      }
      // Съеденные
      document.getElementById('capturedTop').textContent =
        (flipped ? capturedW : capturedB).map(p => pieceChar(p)).join(' ');
      document.getElementById('capturedBottom').textContent =
        (flipped ? capturedB : capturedW).map(p => pieceChar(p)).join(' ');
    }

    function sqName(obj) {
      if (typeof obj === 'string') return obj;
      return String.fromCharCode(97 + obj.col) + (8 - obj.row);
    }

    function onSquareClick(row, col) {
      if (game.game_over()) return;
      if (mode !== 'local' && !isMyTurn()) return;

      const sq = String.fromCharCode(97 + col) + (8 - row);
      const b = game.board();
      const piece = b[row][col];

      if (selected) {
        // Попытка хода
        const from = String.fromCharCode(97 + selected.col) + (8 - selected.row);
        const move = game.move({ from, to: sq, promotion: 'q' });
        if (move) {
          window.BearSound && BearSound.click();
          if (move.captured) {
            const cap = { type: move.captured, color: move.color === 'w' ? 'b' : 'w' };
            if (move.color === 'w') capturedB.push(cap); else capturedW.push(cap);
            window.BearSound && BearSound.pop();
          }
          lastMove = { from: {row: selected.row, col: selected.col}, to: {row, col} };
          selected = null; possibleMoves = [];
          renderBoard(); updateStatus();
          // Отправить ход
          if (mode === 'online') BearMP.send({ type: 'move', san: move.san });
          if (mode === 'bot' && !game.game_over()) setTimeout(botMove, 400 + Math.random() * 600);
          return;
        }
        // Клик по своей фигуре — перевыбрать
        if (piece && piece.color === game.turn()) {
          selectPiece(row, col, sq);
          return;
        }
        selected = null; possibleMoves = [];
        renderBoard();
        return;
      }

      // Выбрать фигуру
      if (piece && piece.color === game.turn()) {
        if (mode !== 'local' && piece.color !== myColor) return;
        selectPiece(row, col, sq);
      }
    }

    function selectPiece(row, col, sq) {
      selected = {row, col};
      possibleMoves = game.moves({ square: sq, verbose: true });
      window.BearSound && BearSound.tap();
      renderBoard();
    }

    function endGame() {
      const title = document.getElementById('winTitle');
      const stat = document.getElementById('winStat');
      if (game.in_checkmate()) {
        const winColor = game.turn() === 'w' ? 'b' : 'w';
        if (mode === 'local') {
          title.textContent = winColor === 'w' ? '⬜ БЕЛЫЕ ПОБЕДИЛИ!' : '⬛ ЧЁРНЫЕ ПОБЕДИЛИ!';
          stat.textContent = 'Мат!';
        } else if (winColor === myColor) {
          title.textContent = '🏆 ТЫ ПОБЕДИЛ!';
          stat.textContent = 'Поставил мат!';
        } else {
          title.textContent = '😢 ПРОИГРАЛ';
          stat.textContent = mode === 'bot' ? 'Бот поставил мат!' : 'Соперник поставил мат!';
        }
        window.BearSound && (game.turn() !== myColor || mode === 'local' ? BearSound.win() : BearSound.lose());
      } else {
        title.textContent = '🤝 НИЧЬЯ';
        stat.textContent = game.in_stalemate() ? 'Пат!' : 'Ничья по правилам';
        window.BearSound && BearSound.match();
      }
      setTimeout(() => document.getElementById('winModal').classList.add('show'), 500);
    }

    function restart() {
      game = new Chess();
      selected = null; possibleMoves = []; lastMove = null;
      capturedW = []; capturedB = [];
      document.getElementById('winModal').classList.remove('show');
      if (mode === 'online') BearMP.send({ type: 'restart' });
      renderBoard(); updateStatus();
    }

    /* === БОТ (случайные ходы — для 6 лет нормально) === */
    function botMove() {
      if (game.game_over()) return;
      const moves = game.moves({ verbose: true });
      if (moves.length === 0) return;
      // Приоритет: взятия > шахи > случайные
      const captures = moves.filter(m => m.captured);
      const chosen = captures.length > 0 && Math.random() < 0.7
        ? captures[Math.floor(Math.random() * captures.length)]
        : moves[Math.floor(Math.random() * moves.length)];
      const move = game.move(chosen.san);
      if (move.captured) {
        const cap = { type: move.captured, color: move.color === 'w' ? 'b' : 'w' };
        if (move.color === 'w') capturedB.push(cap); else capturedW.push(cap);
        window.BearSound && BearSound.pop();
      }
      window.BearSound && BearSound.tap();
      // Найти координаты для lastMove
      const fromCol = chosen.from.charCodeAt(0) - 97, fromRow = 8 - parseInt(chosen.from[1]);
      const toCol = chosen.to.charCodeAt(0) - 97, toRow = 8 - parseInt(chosen.to[1]);
      lastMove = { from: {row:fromRow,col:fromCol}, to: {row:toRow,col:toCol} };
      renderBoard(); updateStatus();
    }

    /* === ОНЛАЙН (MQTT) === */
    async function createRoom() {
      mode = 'online'; myColor = 'w'; flipped = false;
      const code = BearMP.generateCode();
      try {
        await BearMP.connect(code, 'host', handleMsg);
        document.getElementById('lobby').innerHTML = `
          <h2>🏠 КОМНАТА СОЗДАНА</h2>
          <p>Скажи другу эти цифры:</p>
          <div class="code-display">${code}</div>
          <p class="waiting">Ожидание игрока 2...</p>
          <div style="background:#c8e6c9;color:#1b5e20;padding:4px 12px;border-radius:12px;display:inline-block;margin:6px 0;font-family:Nunito,sans-serif;font-weight:700;font-size:.85rem">✅ Подключено</div>
        `;
      } catch (e) { alert(e.message); }
    }
    async function joinRoom() {
      const code = document.getElementById('joinCode').value.trim();
      if (!code || code.length < 4) { alert('Введи 4 цифры!'); return; }
      mode = 'online'; myColor = 'b'; flipped = true;
      try {
        await BearMP.connect(code, 'guest', handleMsg);
        BearMP.send({ type: 'join' });
        showGame();
      } catch (e) { alert(e.message); }
    }
    function handleMsg(data) {
      if (data.type === 'join') { showGame(); }
      if (data.type === 'move') {
        const move = game.move(data.san);
        if (move) {
          if (move.captured) {
            const cap = { type: move.captured, color: move.color === 'w' ? 'b' : 'w' };
            if (move.color === 'w') capturedB.push(cap); else capturedW.push(cap);
            window.BearSound && BearSound.pop();
          }
          window.BearSound && BearSound.tap();
          const fromCol = move.from.charCodeAt(0) - 97, fromRow = 8 - parseInt(move.from[1]);
          const toCol = move.to.charCodeAt(0) - 97, toRow = 8 - parseInt(move.to[1]);
          lastMove = { from:{row:fromRow,col:fromCol}, to:{row:toRow,col:toCol} };
          renderBoard(); updateStatus();
        }
      }
      if (data.type === 'restart') {
        game = new Chess(); selected = null; possibleMoves = []; lastMove = null;
        capturedW = []; capturedB = [];
        document.getElementById('winModal').classList.remove('show');
        renderBoard(); updateStatus();
      }
    }

    function startLocal() { mode = 'local'; flipped = false; showGame(); }
    function startBot() { mode = 'bot'; myColor = 'w'; flipped = false; showGame(); }

    /* Звук */
    function refreshSoundBtns(){const s=window.BearSound;if(!s)return;document.getElementById('sfxBtn').classList.toggle('off',!s.sfxEnabled);document.getElementById('sfxBtn').textContent=s.sfxEnabled?'🔊':'🔇';document.getElementById('musBtn').classList.toggle('off',!s.musicEnabled);document.getElementById('musBtn').textContent=s.musicEnabled?'🎵':'🎶'}
    document.getElementById('sfxBtn').addEventListener('click',()=>{BearSound.toggleSfx();refreshSoundBtns()});
    document.getElementById('musBtn').addEventListener('click',()=>{BearSound.toggleMusic();refreshSoundBtns()});
    window.addEventListener('load',()=>setTimeout(refreshSoundBtns,100));
  </script>
</body>
</html>
