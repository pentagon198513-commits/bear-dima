<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#070b15" />
  <title>🏎️ Машинка — Неоновая гонка</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon-180.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
    body{font-family:'Nunito',system-ui,sans-serif;background:#050814;color:#fff}
    #game{position:relative;width:100vw;height:100vh;overflow:hidden;background:#050814}
    canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
    .topbar{
      position:absolute;left:0;right:0;top:0;z-index:12;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:calc(10px + env(safe-area-inset-top,0px)) 12px 8px;
      pointer-events:none;
      background:linear-gradient(180deg,rgba(5,8,20,.88),rgba(5,8,20,0));
    }
    .round-btn{
      pointer-events:auto;
      width:46px;height:46px;border-radius:50%;
      border:2px solid rgba(255,255,255,.55);
      background:rgba(255,255,255,.13);
      color:#fff;text-decoration:none;
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;font-weight:900;
      box-shadow:0 10px 28px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.25);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .title{
      min-width:0;flex:1;text-align:center;
      font-family:'Bangers',cursive;
      font-size:clamp(1.18rem,5vw,2.35rem);
      letter-spacing:.04em;
      color:#fff;
      -webkit-text-stroke:1.5px #030303;
      text-shadow:2px 3px 0 #f97316,0 0 28px rgba(34,211,238,.65);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .hud{
      position:absolute;left:10px;right:10px;top:calc(64px + env(safe-area-inset-top,0px));z-index:11;
      display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
      pointer-events:none;
    }
    .pill{
      min-width:0;
      padding:7px 8px;border-radius:16px;
      background:linear-gradient(180deg,rgba(15,23,42,.78),rgba(3,7,18,.72));
      border:1px solid rgba(255,255,255,.26);
      box-shadow:0 10px 28px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.16);
      text-align:center;font-weight:900;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .pill small{display:block;font-size:clamp(.56rem,2vw,.72rem);opacity:.78;line-height:1}
    .pill span{display:block;font-family:'Bangers',cursive;font-size:clamp(1rem,4vw,1.55rem);letter-spacing:.04em;color:#fde047;text-shadow:1px 2px 0 #000}
    .effect{
      position:absolute;left:50%;bottom:calc(126px + env(safe-area-inset-bottom,0px));z-index:11;
      transform:translateX(-50%) scale(.96);
      display:none;align-items:center;justify-content:center;
      max-width:88vw;padding:10px 17px;border-radius:20px;
      background:rgba(3,7,18,.74);
      border:1px solid rgba(255,255,255,.32);
      font-weight:900;text-align:center;text-shadow:1px 1px 0 #000;
      box-shadow:0 16px 40px rgba(0,0,0,.34),0 0 36px rgba(34,211,238,.28);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      pointer-events:none;
    }
    .effect.show{display:flex;animation:pop .2s ease forwards}
    @keyframes pop{to{transform:translateX(-50%) scale(1)}}
    .controls{
      position:absolute;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom,0px));z-index:11;
      display:flex;justify-content:center;gap:12px;pointer-events:none;
    }
    .lane-btn{
      pointer-events:auto;
      width:76px;height:64px;border-radius:22px;
      border:2px solid rgba(255,255,255,.62);
      background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.08));
      color:#fff;font-size:1.7rem;font-weight:900;
      box-shadow:0 9px 0 rgba(0,0,0,.24),0 16px 30px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.2);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .lane-btn:active{transform:translateY(5px);box-shadow:0 4px 0 rgba(0,0,0,.24)}
    .overlay,.final{
      position:absolute;inset:0;z-index:30;
      display:flex;align-items:center;justify-content:center;
      padding:18px;
      background:
        radial-gradient(circle at 50% 22%,rgba(34,211,238,.18),transparent 34%),
        radial-gradient(circle at 50% 75%,rgba(249,115,22,.17),transparent 40%),
        linear-gradient(180deg,rgba(5,8,20,.7),rgba(5,8,20,.94));
    }
    .overlay.hide,.final{display:none}
    .final.show{display:flex}
    .card{
      width:min(94vw,560px);
      max-height:92vh;
      overflow:auto;
      padding:22px 18px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.52);
      background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(3,7,18,.94));
      text-align:center;
      box-shadow:0 28px 80px rgba(0,0,0,.58),0 0 56px rgba(34,211,238,.22),inset 0 1px 0 rgba(255,255,255,.22);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }
    .card h1{
      font-family:'Bangers',cursive;
      font-size:clamp(2.15rem,9vw,4rem);
      letter-spacing:.04em;
      color:#fff;
      -webkit-text-stroke:2px #000;
      text-shadow:4px 4px 0 #f97316,0 0 28px rgba(34,211,238,.58);
      line-height:.96;
      margin-bottom:10px;
    }
    .card p{
      margin:7px 0;
      font-weight:900;
      font-size:clamp(.95rem,3.4vw,1.12rem);
      text-shadow:1px 1px 0 #000;
    }
    .garage{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:9px;
      margin:15px 0 8px;
    }
    .car-choice{
      border:2px solid rgba(255,255,255,.24);
      border-radius:16px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      min-height:104px;
      box-shadow:0 12px 26px rgba(0,0,0,.25);
    }
    .car-choice.active{border-color:#fde047;box-shadow:0 0 0 2px rgba(253,224,71,.35),0 16px 32px rgba(0,0,0,.35)}
    .car-choice img{width:100%;height:72px;object-fit:cover;display:block}
    .car-choice span{display:block;padding:7px 5px;font-weight:900;font-size:.78rem;line-height:1.05;text-shadow:1px 1px 0 #000}
    .start-btn,.again-btn{
      width:100%;
      margin-top:14px;
      min-height:62px;
      border-radius:22px;
      border:3px solid #fff;
      background:linear-gradient(180deg,#22d3ee,#2563eb 50%,#f97316);
      color:#fff;
      font-family:'Bangers',cursive;
      font-size:clamp(1.45rem,6vw,2rem);
      letter-spacing:.06em;
      text-shadow:2px 2px 0 #000;
      box-shadow:0 9px 0 rgba(0,0,0,.28),0 0 30px rgba(34,211,238,.28);
      cursor:pointer;
    }
    .start-btn:active,.again-btn:active{transform:translateY(5px);box-shadow:0 4px 0 rgba(0,0,0,.28)}
    @media (max-width:560px){
      .hud{grid-template-columns:repeat(2,1fr);top:calc(58px + env(safe-area-inset-top,0px));left:8px;right:8px}
      .topbar{padding-left:8px;padding-right:8px}
      .round-btn{width:40px;height:40px}
      .garage{grid-template-columns:repeat(2,1fr)}
      .car-choice{min-height:94px}
      .car-choice img{height:62px}
      .controls{gap:9px}
      .lane-btn{width:68px;height:58px}
      .effect{bottom:calc(104px + env(safe-area-inset-bottom,0px));font-size:.92rem}
    }
  </style>
</head>
<body>
<div id="game">
  <canvas id="road"></canvas>

  <div class="topbar">
    <a class="round-btn" href="../" aria-label="Назад">←</a>
    <div class="title">🏎️ МАШИНКА — НЕОНОВАЯ ГОНКА</div>
    <button class="round-btn" id="soundBtn" type="button" aria-label="Звук">🔊</button>
  </div>

  <div class="hud">
    <div class="pill"><small>СЧЁТ</small><span id="scoreEl">0</span></div>
    <div class="pill"><small>РЕКОРД</small><span id="bestEl">0</span></div>
    <div class="pill"><small>БОНУСЫ</small><span id="bonusEl">0</span></div>
    <div class="pill"><small>СКОРОСТЬ</small><span id="speedEl">1x</span></div>
  </div>

  <div class="effect" id="effectEl">Бонус!</div>

  <div class="controls">
    <button class="lane-btn" id="leftBtn" type="button" aria-label="Влево">←</button>
    <button class="lane-btn" id="midBtn" type="button" aria-label="Средняя полоса">●</button>
    <button class="lane-btn" id="rightBtn" type="button" aria-label="Вправо">→</button>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="card">
      <h1>🏎️ НЕОНОВАЯ ГОНКА</h1>
      <p>Выбери настоящую машинку из коллекции.</p>
      <p>Собирай бонусы, включай турбо и не цепляй препятствия.</p>
      <div class="garage" id="garage"></div>
      <p>Телефон: свайп или нажми нужную полосу.</p>
      <button class="start-btn" id="startBtn" type="button">🚦 ЗАВЕСТИ МОТОР</button>
    </div>
  </div>

  <div class="final" id="finalOverlay">
    <div class="card">
      <h1 id="finalTitle">💥 АВАРИЯ</h1>
      <p>Счёт: <span id="finalScore">0</span></p>
      <p>Бонусов собрано: <span id="finalBonus">0</span></p>
      <p>Рекорд: <span id="finalBest">0</span></p>
      <button class="again-btn" id="againBtn" type="button">🔁 ЕЩЁ ЗАЕЗД</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const canvas = document.getElementById('road');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('scoreEl');
  const bestEl = document.getElementById('bestEl');
  const bonusEl = document.getElementById('bonusEl');
  const speedEl = document.getElementById('speedEl');
  const effectEl = document.getElementById('effectEl');
  const startOverlay = document.getElementById('startOverlay');
  const finalOverlay = document.getElementById('finalOverlay');
  const finalTitle = document.getElementById('finalTitle');
  const finalScore = document.getElementById('finalScore');
  const finalBonus = document.getElementById('finalBonus');
  const finalBest = document.getElementById('finalBest');
  const soundBtn = document.getElementById('soundBtn');
  const garage = document.getElementById('garage');

  let W = 0, H = 0, DPR = 1;
  let state = 'menu';
  let lane = 1, carX = 0, carLean = 0;
  let score = 0, scoreCarry = 0, bonuses = 0;
  let best = parseInt(localStorage.getItem('bear_car_runner_best') || '0', 10);
  let speed = 460, distance = 0, spawnTimer = 0, lastTime = performance.now();
  let items = [], particles = [], lights = [], dust = [];
  let shieldUntil = 0, magnetUntil = 0, turboUntil = 0, crashUntil = 0;
  let muted = localStorage.getItem('bear_car_runner_muted') === '1';
  let touchStartX = 0, touchStartY = 0;
  let selectedCar = parseInt(localStorage.getItem('bear_car_runner_car') || '0', 10);
  let engine = null;

  const carModels = [
    {name:'Grave Digger', src:'../img/cars/grave_digger.jpg', glow:'#39ff14'},
    {name:'Megalodon', src:'../img/cars/megalodon.jpg', glow:'#38bdf8'},
    {name:'Bone Shaker', src:'../img/cars/bone_shaker.jpg', glow:'#fb923c'},
    {name:'Bigfoot', src:'../img/cars/bigfoot.jpg', glow:'#60a5fa'},
    {name:'Max-D', src:'../img/cars/max_d.jpg', glow:'#facc15'},
    {name:'El Toro Loco', src:'../img/cars/el_toro_loco.jpg', glow:'#ef4444'}
  ];
  const obstacleTypes = [
    {kind:'cone', label:'Конус', color:'#fb5b24'},
    {kind:'barrier', label:'Барьер', color:'#facc15'},
    {kind:'oil', label:'Масло', color:'#111827'},
    {kind:'tire', label:'Покрышка', color:'#1f2937'}
  ];
  const bonusTypes = [
    {kind:'coin', label:'Монета', points:45, color:'#fde047'},
    {kind:'fuel', label:'Бензин', points:75, color:'#34d399'},
    {kind:'gift', label:'Подарок', points:120, color:'#f472b6'},
    {kind:'shield', label:'Щит', points:60, color:'#60a5fa'},
    {kind:'magnet', label:'Магнит', points:65, color:'#f87171'},
    {kind:'turbo', label:'Турбо', points:100, color:'#22d3ee'}
  ];

  const carImages = carModels.map(model=>{
    const img = new Image();
    img.src = model.src;
    return img;
  });

  bestEl.textContent = best;
  soundBtn.textContent = muted ? '🔇' : '🔊';
  buildGarage();

  function buildGarage(){
    garage.innerHTML = '';
    carModels.forEach((model,i)=>{
      const btn = document.createElement('button');
      btn.className = 'car-choice' + (i === selectedCar ? ' active' : '');
      btn.type = 'button';
      btn.innerHTML = '<img src="' + model.src + '" alt=""><span>' + model.name + '</span>';
      btn.addEventListener('click', ()=>{
        selectedCar = i;
        localStorage.setItem('bear_car_runner_car', selectedCar);
        document.querySelectorAll('.car-choice').forEach(el=>el.classList.remove('active'));
        btn.classList.add('active');
        soundClick();
      });
      garage.appendChild(btn);
    });
  }

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    carX = laneX(lane);
    buildLights();
  }

  function buildLights(){
    lights = [];
    for(let i=0;i<28;i++){
      lights.push({
        side:i%2 ? 1 : -1,
        y:Math.random()*H,
        hue:Math.random()<.5 ? '#22d3ee' : '#f97316',
        phase:Math.random()*Math.PI*2
      });
    }
  }

  function roadBounds(){
    const roadW = Math.min(W * 0.86, 620);
    return {left:(W-roadW)/2, right:(W+roadW)/2, width:roadW};
  }

  function laneX(n){
    const b = roadBounds();
    return b.left + b.width * (0.2 + n * 0.3);
  }

  function carY(){
    return H - Math.max(132, H * 0.18);
  }

  function audioCtx(){
    if(muted) return null;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    if(!window.__carAudio) window.__carAudio = new Ctx();
    if(window.__carAudio.state === 'suspended') window.__carAudio.resume();
    return window.__carAudio;
  }

  function tone(freq, dur, type, vol){
    const a = audioCtx();
    if(!a) return;
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, a.currentTime);
    gain.gain.setValueAtTime(vol || .08, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, a.currentTime + dur);
    osc.connect(gain);
    gain.connect(a.destination);
    osc.start();
    osc.stop(a.currentTime + dur);
  }

  function startEngine(){
    const a = audioCtx();
    if(!a || engine) return;
    const osc = a.createOscillator();
    const growl = a.createOscillator();
    const gain = a.createGain();
    const filter = a.createBiquadFilter();
    osc.type = 'sawtooth';
    growl.type = 'square';
    filter.type = 'lowpass';
    filter.frequency.value = 420;
    gain.gain.value = .0001;
    osc.connect(filter);
    growl.connect(filter);
    filter.connect(gain);
    gain.connect(a.destination);
    osc.start();
    growl.start();
    engine = {osc,growl,gain,filter};
  }

  function stopEngine(){
    if(!engine) return;
    const a = audioCtx();
    if(a){
      engine.gain.gain.setTargetAtTime(.0001, a.currentTime, .08);
      setTimeout(()=>{
        try{ engine.osc.stop(); engine.growl.stop(); }catch(e){}
        engine = null;
      }, 220);
    } else {
      engine = null;
    }
  }

  function updateEngine(){
    if(!engine || muted) return;
    const a = audioCtx();
    if(!a) return;
    const rpm = 70 + (speed - 420) * .18 + (performance.now() < turboUntil ? 60 : 0);
    engine.osc.frequency.setTargetAtTime(rpm, a.currentTime, .05);
    engine.growl.frequency.setTargetAtTime(rpm * .48, a.currentTime, .08);
    engine.filter.frequency.setTargetAtTime(420 + speed * .75, a.currentTime, .08);
    engine.gain.gain.setTargetAtTime(state === 'play' ? .055 : .0001, a.currentTime, .1);
  }

  function soundBonus(){ tone(620,.06,'triangle',.11); setTimeout(()=>tone(980,.08,'triangle',.1),48); }
  function soundPower(){ tone(430,.08,'triangle',.1); setTimeout(()=>tone(860,.11,'triangle',.11),65); setTimeout(()=>tone(1240,.12,'sine',.08),120); }
  function soundClick(){ tone(240,.04,'square',.045); }
  function soundLane(){ tone(190,.035,'square',.05); setTimeout(()=>tone(260,.035,'square',.04),28); }
  function soundCrash(){ tone(72,.2,'sawtooth',.18); setTimeout(()=>tone(44,.28,'square',.13),70); setTimeout(()=>tone(110,.12,'sawtooth',.1),130); }

  function haptic(pattern){
    if(!navigator.vibrate) return;
    try{ navigator.vibrate(pattern); }catch(e){}
  }

  function showEffect(text){
    effectEl.textContent = text;
    effectEl.classList.add('show');
    clearTimeout(showEffect.timer);
    showEffect.timer = setTimeout(()=>effectEl.classList.remove('show'), 1100);
  }

  function start(){
    state = 'play';
    lane = 1;
    carX = laneX(1);
    carLean = 0;
    score = 0;
    scoreCarry = 0;
    bonuses = 0;
    speed = 460;
    distance = 0;
    spawnTimer = .2;
    items = [];
    particles = [];
    dust = [];
    shieldUntil = 0;
    magnetUntil = 0;
    turboUntil = 0;
    crashUntil = 0;
    startOverlay.classList.add('hide');
    finalOverlay.classList.remove('show');
    updateHud();
    startEngine();
    soundPower();
    showEffect('🏁 Мотор заведён!');
    haptic([20,25,30]);
  }

  function endGame(){
    if(state === 'over') return;
    state = 'over';
    crashUntil = performance.now() + 650;
    stopEngine();
    soundCrash();
    haptic([75,45,120]);
    if(score > best){
      best = score;
      localStorage.setItem('bear_car_runner_best', best);
      finalTitle.textContent = '🏆 НОВЫЙ РЕКОРД!';
    } else {
      finalTitle.textContent = '💥 АВАРИЯ';
    }
    finalScore.textContent = score;
    finalBonus.textContent = bonuses;
    finalBest.textContent = best;
    bestEl.textContent = best;
    setTimeout(()=>finalOverlay.classList.add('show'), 650);
  }

  function updateHud(){
    scoreEl.textContent = score;
    bonusEl.textContent = bonuses;
    bestEl.textContent = best;
    speedEl.textContent = (speed / 460).toFixed(1) + 'x';
  }

  function moveTo(next){
    if(state !== 'play') return;
    const nextLane = Math.max(0, Math.min(2, next));
    if(nextLane !== lane){
      carLean = nextLane > lane ? .22 : -.22;
      lane = nextLane;
      soundLane();
      haptic(12);
    }
  }

  function spawnItem(){
    const isBonus = Math.random() < .64;
    const laneId = Math.floor(Math.random()*3);
    if(isBonus){
      const type = bonusTypes[Math.floor(Math.random()*bonusTypes.length)];
      items.push({type:'bonus', lane:laneId, y:-80, z:0, size:46, data:type, spin:Math.random()*Math.PI*2, magnetX:null});
    } else {
      const type = obstacleTypes[Math.floor(Math.random()*obstacleTypes.length)];
      items.push({type:'obstacle', lane:laneId, y:-90, z:0, size:58, data:type, spin:Math.random()*Math.PI*2});
    }
  }

  function collect(item){
    bonuses++;
    score += item.data.points;
    const now = performance.now();
    if(item.data.kind === 'shield'){
      shieldUntil = now + 7000;
      showEffect('🛡️ Щит включён!');
      soundPower();
      haptic([20,25,35]);
    } else if(item.data.kind === 'magnet'){
      magnetUntil = now + 7500;
      showEffect('🧲 Магнит тянет бонусы!');
      soundPower();
      haptic([18,30,18]);
    } else if(item.data.kind === 'turbo'){
      turboUntil = now + 4700;
      showEffect('⚡ Турбо!');
      soundPower();
      haptic([25,25,25]);
    } else {
      showEffect('+' + item.data.points + ' ' + item.data.label);
      soundBonus();
      haptic(18);
    }
    burst(itemScreenX(item), item.y, item.data.color, 18);
    updateHud();
  }

  function hitObstacle(item){
    if(performance.now() < shieldUntil){
      shieldUntil = 0;
      showEffect('🛡️ Щит спас!');
      burst(itemScreenX(item), item.y, '#60a5fa', 28);
      soundPower();
      haptic([30,30,30]);
      return;
    }
    burst(itemScreenX(item), item.y, '#fb553c', 42);
    endGame();
  }

  function burst(x,y,color,count){
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const v = 90 + Math.random()*260;
      particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:.45+Math.random()*.45,color,size:2+Math.random()*5});
    }
  }

  function update(dt){
    updateEngine();
    if(state === 'play'){
      const now = performance.now();
      const turbo = now < turboUntil;
      const realSpeed = speed * (turbo ? 1.22 : 1);
      distance += realSpeed * dt;
      scoreCarry += realSpeed * dt * (turbo ? .095 : .052);
      const distancePoints = Math.floor(scoreCarry);
      if(distancePoints > 0){
        score += distancePoints;
        scoreCarry -= distancePoints;
      }
      speed = Math.min(900, speed + dt * 10.5);
      const targetX = laneX(lane);
      carX += (targetX - carX) * Math.min(1, dt * 12);
      carLean *= Math.max(0, 1 - dt * 5.5);
      spawnTimer -= dt;
      if(spawnTimer <= 0){
        spawnItem();
        spawnTimer = Math.max(.42, 1.0 - (speed - 460) / 820 + Math.random()*.22);
      }
      if(Math.random() < dt * 22){
        dust.push({x:carX+(Math.random()-.5)*72,y:carY()+44,vx:(Math.random()-.5)*35,vy:70+Math.random()*80,life:.4,color:turbo?'#fde047':'#94a3b8'});
      }
      const magnet = now < magnetUntil;
      const cy = carY();
      for(const it of items){
        it.y += realSpeed * dt;
        it.spin += dt * (it.type === 'bonus' ? 5.5 : 2.2);
        if(magnet && it.type === 'bonus'){
          const dx = carX - itemScreenX(it);
          const dy = cy - it.y;
          if(Math.hypot(dx,dy) < 210){
            it.y += dy * dt * 4.5;
            it.magnetX = (it.magnetX == null ? laneX(it.lane) : it.magnetX) + dx * dt * 4.5;
          }
        }
      }
      const carBox = {x:carX-36,y:cy-52,w:72,h:104};
      items = items.filter(it=>{
        const ix = itemScreenX(it);
        const box = {x:ix-it.size*.48,y:it.y-it.size*.48,w:it.size*.96,h:it.size*.96};
        if(overlap(carBox, box)){
          if(it.type === 'bonus') collect(it); else hitObstacle(it);
          return false;
        }
        return it.y < H + 110 && state === 'play';
      });
      updateHud();
    }
    particles = particles.filter(p=>{
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      return p.life > 0;
    });
    dust = dust.filter(p=>{
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      return p.life > 0;
    });
  }

  function overlap(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    drawWorld();
    drawItems();
    drawDust();
    drawCar(carX, carY(), performance.now(), state !== 'menu');
    drawParticles();
    if(state === 'menu') drawShowCar();
    if(performance.now() < crashUntil) drawCrashFlash();
  }

  function drawWorld(){
    const t = performance.now()/1000;
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#050814');
    sky.addColorStop(.35,'#0f2d52');
    sky.addColorStop(.65,'#111827');
    sky.addColorStop(1,'#050814');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,H);
    drawMoon(t);
    drawCity(t);
    drawRoad(t);
    drawRoadLights(t);
  }

  function drawMoon(t){
    const x = W*.78, y = H*.18;
    const g = ctx.createRadialGradient(x,y,4,x,y,90);
    g.addColorStop(0,'rgba(255,255,255,.92)');
    g.addColorStop(.26,'rgba(186,230,253,.35)');
    g.addColorStop(1,'rgba(186,230,253,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,90,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath(); ctx.arc(x,y,24+Math.sin(t)*2,0,Math.PI*2); ctx.fill();
  }

  function drawCity(t){
    const horizon = H*.46;
    ctx.fillStyle='#07111f';
    ctx.fillRect(0,horizon,W,H*.12);
    for(let layer=0;layer<2;layer++){
      const base = horizon + layer*22;
      const color = layer ? '#0b1729' : '#10213a';
      ctx.fillStyle = color;
      for(let i=0;i<18;i++){
        const bw = 30 + ((i*19+layer*11)%34);
        const bh = 70 + ((i*43+layer*31)%130);
        const x = (i*67 + layer*34 - (distance*.018*(layer+1))%67) - 40;
        ctx.fillRect(x, base-bh, bw, bh);
        ctx.fillStyle = 'rgba(253,224,71,.35)';
        for(let r=0;r<5;r++){
          for(let c=0;c<3;c++){
            if((r+c+i+layer)%3===0) ctx.fillRect(x+7+c*10, base-bh+14+r*22, 4, 8);
          }
        }
        ctx.fillStyle = color;
      }
    }
  }

  function drawRoad(t){
    const b = roadBounds();
    const cx = W/2;
    const topY = H*.25;
    const road = ctx.createLinearGradient(0,topY,0,H);
    road.addColorStop(0,'#30394a');
    road.addColorStop(.45,'#1b2230');
    road.addColorStop(1,'#070b15');
    ctx.fillStyle = road;
    ctx.beginPath();
    ctx.moveTo(cx - b.width*.15, topY);
    ctx.lineTo(cx + b.width*.15, topY);
    ctx.lineTo(b.right, H);
    ctx.lineTo(b.left, H);
    ctx.closePath();
    ctx.fill();

    const shoulder = ctx.createLinearGradient(0,topY,0,H);
    shoulder.addColorStop(0,'rgba(34,211,238,.18)');
    shoulder.addColorStop(1,'rgba(249,115,22,.45)');
    ctx.strokeStyle = shoulder;
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(b.left,H); ctx.lineTo(cx-b.width*.15,topY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.right,H); ctx.lineTo(cx+b.width*.15,topY); ctx.stroke();

    ctx.strokeStyle='rgba(255,255,255,.18)';
    ctx.lineWidth=1;
    for(let i=0;i<12;i++){
      const y = H - ((i*68 + distance*.2) % (H-topY+80));
      const p = 1 - (H-y)/(H-topY);
      const half = b.width*(.15 + .35*p);
      ctx.beginPath();
      ctx.moveTo(cx-half,y);
      ctx.lineTo(cx+half,y);
      ctx.stroke();
    }

    ctx.strokeStyle='rgba(253,224,71,.88)';
    ctx.lineWidth=5;
    ctx.setLineDash([34,30]);
    ctx.lineDashOffset = -((distance*.105)%64);
    for(let i=1;i<3;i++){
      const x1 = b.left + b.width*(i/3);
      const topX = cx + (x1-cx)*.32;
      ctx.beginPath(); ctx.moveTo(x1,H); ctx.lineTo(topX,topY); ctx.stroke();
    }
    ctx.setLineDash([]);

    const shine = ctx.createLinearGradient(0,topY,0,H);
    shine.addColorStop(0,'rgba(255,255,255,.1)');
    shine.addColorStop(.45,'rgba(255,255,255,.03)');
    shine.addColorStop(1,'rgba(255,255,255,.12)');
    ctx.fillStyle = shine;
    ctx.beginPath();
    ctx.moveTo(cx - b.width*.05, topY);
    ctx.lineTo(cx + b.width*.05, topY);
    ctx.lineTo(cx + b.width*.18, H);
    ctx.lineTo(cx - b.width*.18, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawRoadLights(t){
    const b = roadBounds();
    const topY = H*.25;
    for(const light of lights){
      const y = H - ((light.y + distance*.22) % (H-topY+120));
      const p = 1 - (H-y)/(H-topY);
      const sideX = light.side < 0 ? b.left - 28 - p*80 : b.right + 28 + p*80;
      const glow = ctx.createRadialGradient(sideX,y,2,sideX,y,46);
      glow.addColorStop(0,light.hue);
      glow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha = .55 + Math.sin(t*3 + light.phase)*.18;
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(sideX,y,46,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function itemScreenX(it){
    const base = it.magnetX == null ? laneX(it.lane) : it.magnetX;
    return base + Math.sin(it.spin) * (it.type === 'bonus' ? 5 : 2);
  }

  function drawItems(){
    for(const it of items){
      const x = itemScreenX(it);
      const y = it.y;
      const scale = 1 + Math.min(.3, y/H*.22);
      const s = it.size * scale;
      ctx.save();
      ctx.translate(x,y);
      if(it.type === 'bonus') drawBonus(it,s); else drawObstacle(it,s);
      ctx.restore();
    }
  }

  function drawBonus(it,s){
    ctx.shadowColor = it.data.color;
    ctx.shadowBlur = 24;
    const ring = ctx.createRadialGradient(0,0,4,0,0,s*.7);
    ring.addColorStop(0,'rgba(255,255,255,.82)');
    ring.addColorStop(.45,it.data.color);
    ring.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = ring;
    ctx.beginPath(); ctx.arc(0,0,s*.72,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    if(it.data.kind === 'fuel') drawFuel(s);
    else if(it.data.kind === 'gift') drawGift(s);
    else if(it.data.kind === 'shield') drawShield(s);
    else if(it.data.kind === 'magnet') drawMagnet(s);
    else if(it.data.kind === 'turbo') drawBolt(s);
    else drawCoin(s);
  }

  function drawCoin(s){
    ctx.fillStyle='#facc15'; ctx.beginPath(); ctx.arc(0,0,s*.34,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff7ad'; ctx.lineWidth=4; ctx.stroke();
    ctx.fillStyle='#7c2d12'; ctx.font='900 '+Math.round(s*.35)+'px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('★',0,1);
  }
  function drawFuel(s){
    ctx.fillStyle='#22c55e'; roundRect(-s*.22,-s*.34,s*.44,s*.68,7); ctx.fill();
    ctx.fillStyle='#dcfce7'; ctx.fillRect(-s*.13,-s*.23,s*.22,s*.18);
    ctx.strokeStyle='#052e16'; ctx.lineWidth=3; ctx.stroke();
  }
  function drawGift(s){
    ctx.fillStyle='#f472b6'; roundRect(-s*.32,-s*.25,s*.64,s*.52,8); ctx.fill();
    ctx.fillStyle='#fde047'; ctx.fillRect(-s*.05,-s*.28,s*.1,s*.56); ctx.fillRect(-s*.33,-s*.04,s*.66,s*.09);
  }
  function drawShield(s){
    ctx.fillStyle='#60a5fa'; ctx.beginPath(); ctx.moveTo(0,-s*.38); ctx.lineTo(s*.32,-s*.18); ctx.lineTo(s*.22,s*.28); ctx.lineTo(0,s*.42); ctx.lineTo(-s*.22,s*.28); ctx.lineTo(-s*.32,-s*.18); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#dbeafe'; ctx.lineWidth=3; ctx.stroke();
  }
  function drawMagnet(s){
    ctx.strokeStyle='#ef4444'; ctx.lineWidth=s*.18; ctx.lineCap='round'; ctx.beginPath(); ctx.arc(0,0,s*.28,Math.PI*.15,Math.PI*.85,true); ctx.stroke();
    ctx.fillStyle='#f8fafc'; ctx.fillRect(-s*.36,-s*.1,s*.14,s*.16); ctx.fillRect(s*.22,-s*.1,s*.14,s*.16);
  }
  function drawBolt(s){
    ctx.fillStyle='#fde047'; ctx.beginPath(); ctx.moveTo(s*.08,-s*.42); ctx.lineTo(-s*.24,s*.04); ctx.lineTo(s*.02,s*.04); ctx.lineTo(-s*.1,s*.42); ctx.lineTo(s*.28,-s*.08); ctx.lineTo(s*.02,-s*.08); ctx.closePath(); ctx.fill();
  }

  function drawObstacle(it,s){
    ctx.shadowColor='rgba(0,0,0,.65)';
    ctx.shadowBlur=14;
    if(it.data.kind === 'cone') drawCone(s);
    else if(it.data.kind === 'barrier') drawBarrier(s);
    else if(it.data.kind === 'oil') drawOil(s);
    else drawTire(s);
    ctx.shadowBlur=0;
  }
  function drawCone(s){
    ctx.fillStyle='#f97316'; ctx.beginPath(); ctx.moveTo(0,-s*.45); ctx.lineTo(s*.34,s*.32); ctx.lineTo(-s*.34,s*.32); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(-s*.18,-s*.05,s*.36,s*.08); ctx.fillRect(-s*.25,s*.17,s*.5,s*.08);
    ctx.fillStyle='#7c2d12'; roundRect(-s*.42,s*.28,s*.84,s*.16,5); ctx.fill();
  }
  function drawBarrier(s){
    ctx.fillStyle='#111827'; roundRect(-s*.44,-s*.24,s*.88,s*.48,8); ctx.fill();
    ctx.fillStyle='#facc15';
    for(let i=-2;i<3;i++) ctx.fillRect(i*s*.2-s*.05,-s*.22,s*.1,s*.44);
  }
  function drawOil(s){
    ctx.fillStyle='rgba(2,6,23,.9)'; ctx.beginPath(); ctx.ellipse(0,0,s*.48,s*.27,Math.sin(distance*.01)*.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(34,211,238,.55)'; ctx.lineWidth=2; ctx.stroke();
  }
  function drawTire(s){
    ctx.fillStyle='#020617'; ctx.beginPath(); ctx.arc(0,0,s*.42,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#64748b'; ctx.beginPath(); ctx.arc(0,0,s*.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#111827'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,s*.31,0,Math.PI*2); ctx.stroke();
  }

  function drawCar(x,y,now,isPlayer){
    const model = carModels[selectedCar] || carModels[0];
    const img = carImages[selectedCar];
    const turbo = now < turboUntil;
    const shield = now < shieldUntil;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(carLean + Math.sin(now/120)*.012);
    if(turbo) drawNitroFlame(now);
    if(shield) drawShieldBubble(now, model.glow);
    ctx.fillStyle='rgba(0,0,0,.48)';
    ctx.beginPath(); ctx.ellipse(0,50,54,17,0,0,Math.PI*2); ctx.fill();
    ctx.shadowColor = model.glow;
    ctx.shadowBlur = turbo ? 34 : 18;
    roundRect(-48,-62,96,122,20);
    ctx.fillStyle='rgba(255,255,255,.12)';
    ctx.fill();
    ctx.clip();
    if(img && img.complete && img.naturalWidth){
      const ratio = img.naturalWidth / img.naturalHeight;
      let sw = 96, sh = 122;
      if(ratio > .78) sw = sh * ratio;
      else sh = sw / ratio;
      ctx.drawImage(img, -sw/2, -sh/2, sw, sh);
      ctx.fillStyle='rgba(0,0,0,.16)';
      ctx.fillRect(-48,-62,96,122);
    } else {
      const g = ctx.createLinearGradient(-44,-58,44,58);
      g.addColorStop(0,model.glow);
      g.addColorStop(1,'#f97316');
      ctx.fillStyle=g;
      ctx.fillRect(-48,-62,96,122);
    }
    ctx.restore();
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(carLean + Math.sin(now/120)*.012);
    ctx.strokeStyle='rgba(255,255,255,.86)';
    ctx.lineWidth=2;
    roundRect(-48,-62,96,122,20); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.fillRect(-34,-48,68,6);
    ctx.fillStyle='rgba(253,224,71,.9)';
    ctx.fillRect(-38,43,20,8);
    ctx.fillRect(18,43,20,8);
    ctx.restore();
  }

  function drawNitroFlame(now){
    for(let i=0;i<3;i++){
      const len = 40 + Math.sin(now/70+i)*12;
      const g = ctx.createRadialGradient(0,60+i*10,2,0,74+i*12,len);
      g.addColorStop(0,'rgba(255,255,255,.9)');
      g.addColorStop(.25,'rgba(34,211,238,.75)');
      g.addColorStop(1,'rgba(249,115,22,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(0,70+i*8,18-i*3,len,0,0,Math.PI*2); ctx.fill();
    }
  }

  function drawShieldBubble(now,color){
    ctx.strokeStyle=color;
    ctx.lineWidth=5;
    ctx.shadowColor=color;
    ctx.shadowBlur=26;
    ctx.globalAlpha=.72 + Math.sin(now/120)*.14;
    ctx.beginPath(); ctx.ellipse(0,0,64,78,0,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.shadowBlur=0;
  }

  function drawShowCar(){
    drawCar(W/2, H*.71, performance.now(), false);
  }

  function drawDust(){
    for(const p of dust){
      ctx.globalAlpha = Math.max(0,p.life*1.8);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.ellipse(p.x,p.y,5+p.life*13,2+p.life*5,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha = Math.max(0,p.life*1.7);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size+p.life*4,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCrashFlash(){
    ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.fillRect(0,0,W,H);
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function loop(now){
    const dt = Math.min(.05,(now-lastTime)/1000);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('againBtn').addEventListener('click', start);
  document.getElementById('leftBtn').addEventListener('click', ()=>moveTo(lane-1));
  document.getElementById('midBtn').addEventListener('click', ()=>moveTo(1));
  document.getElementById('rightBtn').addEventListener('click', ()=>moveTo(lane+1));
  soundBtn.addEventListener('click', ()=>{
    muted = !muted;
    localStorage.setItem('bear_car_runner_muted', muted ? '1' : '0');
    soundBtn.textContent = muted ? '🔇' : '🔊';
    if(muted) stopEngine();
    else { soundPower(); if(state === 'play') startEngine(); }
  });
  window.addEventListener('keydown', e=>{
    if(e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') moveTo(lane-1);
    if(e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') moveTo(lane+1);
    if(e.key === ' ' && state !== 'play') start();
  });
  canvas.addEventListener('pointerdown', e=>{
    touchStartX = e.clientX;
    touchStartY = e.clientY;
  }, {passive:false});
  canvas.addEventListener('pointerup', e=>{
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    if(Math.abs(dx) > 34 && Math.abs(dx) > Math.abs(dy)){
      moveTo(lane + (dx > 0 ? 1 : -1));
    } else if(state === 'play') {
      const b = roadBounds();
      const rel = (e.clientX - b.left) / b.width;
      if(rel < .34) moveTo(0);
      else if(rel > .66) moveTo(2);
      else moveTo(1);
    } else {
      start();
    }
  }, {passive:false});
  window.addEventListener('resize', resize);
  window.addEventListener('pagehide', stopEngine);

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
