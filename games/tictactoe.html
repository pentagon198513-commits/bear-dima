<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FF6B00" />
  <title>❌⭕ Крестики-нолики — Медведь</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game.css" />
  <script src="sounds.js" defer></script>
  <script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <script src="multiplayer.js"></script>
  <style>
    .lobby{text-align:center;padding:20px}
    .lobby h2{font-family:'Bangers',sans-serif;font-size:clamp(1.5rem,5vw,2.5rem);color:var(--hw-red);margin:10px 0}
    .lobby p{font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(.95rem,3vw,1.15rem);color:#333;margin:6px 0}
    .lobby-btn{display:inline-block;margin:8px 6px;padding:14px 24px;min-height:56px;background:linear-gradient(135deg,var(--hw-orange),var(--hw-red));border:4px solid #fff;border-radius:24px;color:#fff;font-family:'Bangers',sans-serif;font-size:clamp(1.1rem,3.5vw,1.4rem);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);transition:transform .15s}
    .lobby-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
    .lobby-btn.green{background:linear-gradient(135deg,#39ff14,#0d7a00)}
    .lobby-btn.gray{background:linear-gradient(135deg,#888,#555)}
    .lobby-btn.blue{background:linear-gradient(135deg,#0066ff,#00c6ff)}
    .code-display{font-family:'Bangers',sans-serif;font-size:clamp(2rem,8vw,3.5rem);color:var(--hw-blue);letter-spacing:.15em;background:#fff;border:4px solid var(--hw-blue);border-radius:16px;padding:10px 24px;display:inline-block;margin:12px 0;user-select:all}
    .code-input{font-family:'Bangers',sans-serif;font-size:clamp(1.5rem,6vw,2.5rem);text-align:center;letter-spacing:.15em;border:4px solid var(--hw-blue);border-radius:16px;padding:10px 20px;width:180px;outline:none;color:var(--hw-blue)}
    .code-input:focus{border-color:var(--hw-orange)}
    .or-divider{font-family:'Nunito',sans-serif;font-weight:900;color:#999;font-size:1rem;margin:8px 0}
    .waiting{animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
    .status-bar{text-align:center;font-family:'Bangers',sans-serif;font-size:clamp(1.2rem,4vw,1.8rem);padding:10px;color:#fff;text-shadow:2px 2px 0 #000}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,12px);width:min(88vw,420px);aspect-ratio:1/1;margin:0 auto;padding:8px}
    .cell{background:#fff;border:4px solid var(--hw-yellow);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:clamp(3rem,15vw,6rem);cursor:pointer;user-select:none;transition:transform .15s,background .15s;box-shadow:0 4px 10px rgba(0,0,0,.15)}
    .cell:hover:not(.taken){background:#fff9c4;transform:scale(1.05)}
    .cell:active:not(.taken){transform:scale(.95)}
    .cell.taken{cursor:default}
    .cell.win-cell{background:#c8e6c9;border-color:#39ff14;box-shadow:0 0 20px #39ff14}
    .cell .x{color:var(--hw-red)}.cell .o{color:var(--hw-blue)}
    .howto{background:#fff;border-radius:16px;padding:12px 16px;margin:10px auto;max-width:340px;text-align:left;border:3px solid #ffcc00;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .howto p{margin:0 0 4px;font-size:.9rem}
    .howto b{color:var(--hw-red)}
    .conn-status{font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;padding:4px 12px;border-radius:12px;display:inline-block;margin:4px 0}
    .conn-ok{background:#c8e6c9;color:#1b5e20}
    .conn-wait{background:#fff9c4;color:#f57f17}
    .conn-err{background:#ffcdd2;color:#b71c1c}
  </style>
</head>
<body>
  <header class="game-header">
    <a href="../" class="back-btn"><span>←</span><span>НАЗАД</span></a>
    <h1 class="game-title">❌⭕ КРЕСТИКИ-НОЛИКИ</h1>
    <div class="sound-toggles">
      <button class="sound-btn" id="sfxBtn">🔊</button>
      <button class="sound-btn" id="musBtn">🎵</button>
    </div>
  </header>

  <div id="lobby" class="lobby">
    <h2>🎮 ИГРАЙ С ДРУГОМ</h2>
    <div class="howto">
      <p><b>Онлайн (2 устройства):</b></p>
      <p>1️⃣ Игрок 1 → <b>«Создать»</b> → получит 4 цифры</p>
      <p>2️⃣ Игрок 2 → вводит цифры → <b>«Подключиться»</b></p>
      <p style="margin-top:6px"><b>На одном устройстве:</b></p>
      <p>Просто играйте по очереди!</p>
    </div>
    <button class="lobby-btn" onclick="createRoom()">🏠 СОЗДАТЬ ИГРУ</button>
    <div class="or-divider">— ИЛИ —</div>
    <p>Введи 4 цифры от друга:</p>
    <input class="code-input" id="joinCode" maxlength="4" placeholder="1234" inputmode="numeric" pattern="[0-9]*" autocomplete="off" />
    <br /><button class="lobby-btn green" onclick="joinRoom()">🚀 ПОДКЛЮЧИТЬСЯ</button>
    <div class="or-divider">— ИЛИ —</div>
    <button class="lobby-btn blue" onclick="startLocal()">🤝 ВДВОЁМ НА ОДНОМ</button>
    <button class="lobby-btn gray" onclick="startBot()">🤖 С БОТОМ</button>
    <div id="connStatus"></div>
  </div>

  <div id="gameView" style="display:none;">
    <div class="status-bar" id="status">Ожидание...</div>
    <div class="board" id="board"></div>
  </div>

  <div class="win-modal" id="winModal">
    <div class="win-box">
      <h2 class="win-title" id="winTitle">🏆 ПОБЕДА!</h2>
      <div class="win-stat" id="winStat"></div>
      <button class="win-btn" onclick="rematch()">🔁 ЕЩЁ РАЗ</button><br />
      <a href="../" class="win-btn" style="margin-top:10px;">🏠 ДОМОЙ</a>
    </div>
  </div>

  <script>
    let board = Array(9).fill('');
    let myMark = '', currentMark = 'X';
    let myTurn = false, gameOver = false;
    let mode = ''; // 'online','bot','local'
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function showGame() {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('gameView').style.display = 'block';
      renderBoard(); updateStatus();
    }
    function setStatus(text, color) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.style.color = color || '#fff';
      el.classList.remove('waiting');
    }
    function setConnStatus(text, type) {
      document.getElementById('connStatus').innerHTML =
        `<div class="conn-status conn-${type}">${text}</div>`;
    }

    function renderBoard() {
      const el = document.getElementById('board'); el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ' taken' : '');
        if (val) {
          const s = document.createElement('span');
          s.className = val === 'X' ? 'x' : 'o';
          s.textContent = val === 'X' ? '❌' : '⭕';
          cell.appendChild(s);
        }
        cell.onclick = () => onCellClick(i);
        el.appendChild(cell);
      });
    }

    function updateStatus() {
      if (gameOver) return;
      if (mode === 'local') {
        setStatus(`Ход: ${currentMark === 'X' ? '❌' : '⭕'}`, '#39ff14');
      } else if (myTurn) {
        setStatus(`Твой ход! Ты — ${myMark === 'X' ? '❌' : '⭕'}`, '#39ff14');
      } else {
        setStatus(mode === 'bot' ? '🤖 Бот думает...' : '⏳ Ход соперника...', '#ffcc00');
      }
    }

    function onCellClick(i) {
      if (board[i] || gameOver) return;
      if (mode === 'local') {
        board[i] = currentMark;
        window.BearSound && BearSound.click();
        currentMark = currentMark === 'X' ? 'O' : 'X';
        renderBoard(); updateStatus();
        const r = checkWin(); if (r) endGame(r, null);
      } else if (mode === 'bot') {
        if (!myTurn) return;
        board[i] = myMark; myTurn = false;
        window.BearSound && BearSound.click();
        renderBoard(); updateStatus();
        const r = checkWin(); if (r) return endGame(r, myMark);
        setTimeout(botMove, 400 + Math.random() * 400);
      } else { // online
        if (!myTurn) return;
        board[i] = myMark; myTurn = false;
        window.BearSound && BearSound.click();
        BearMP.send({ type: 'move', index: i });
        renderBoard(); updateStatus();
        const r = checkWin(); if (r) endGame(r, myMark);
      }
    }

    function receiveMove(i) {
      const opMark = myMark === 'X' ? 'O' : 'X';
      board[i] = opMark; myTurn = true;
      window.BearSound && BearSound.tap();
      renderBoard(); updateStatus();
      const r = checkWin(); if (r) endGame(r, myMark);
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a]===board[b] && board[b]===board[c])
          return { winner: board[a], combo: [a,b,c] };
      }
      if (board.every(c=>c)) return { winner: 'draw', combo: null };
      return null;
    }

    function endGame(result, perspective) {
      gameOver = true;
      const title = document.getElementById('winTitle');
      const stat = document.getElementById('winStat');
      if (result.winner === 'draw') {
        title.textContent = '🤝 НИЧЬЯ!';
        stat.textContent = 'Оба молодцы!';
        window.BearSound && BearSound.match();
      } else if (mode === 'local') {
        title.textContent = `${result.winner === 'X' ? '❌' : '⭕'} ПОБЕДИЛ!`;
        stat.textContent = '';
        window.BearSound && BearSound.win();
      } else if (result.winner === perspective) {
        title.textContent = '🏆 ТЫ ПОБЕДИЛ!';
        stat.textContent = `${perspective === 'X' ? '❌' : '⭕'} — чемпион!`;
        window.BearSound && BearSound.win();
      } else {
        title.textContent = '😢 ПРОИГРАЛ';
        stat.textContent = mode === 'bot' ? 'Бот оказался хитрее!' : 'Соперник победил!';
        window.BearSound && BearSound.lose();
      }
      if (result.combo) {
        const cells = document.querySelectorAll('.cell');
        result.combo.forEach(i => cells[i].classList.add('win-cell'));
      }
      setTimeout(() => document.getElementById('winModal').classList.add('show'), 400);
    }

    function rematch() {
      board = Array(9).fill('');
      gameOver = false; currentMark = 'X';
      document.getElementById('winModal').classList.remove('show');
      if (mode === 'online') { myTurn = myMark === 'X'; BearMP.send({ type: 'rematch' }); }
      else if (mode === 'bot') { myTurn = true; }
      renderBoard(); updateStatus();
      if (mode === 'bot' && !myTurn) setTimeout(botMove, 500);
    }

    /* === БОТ === */
    function botMove() {
      if (gameOver) return;
      const op = myMark === 'X' ? 'O' : 'X';
      let m = findWin(op);
      if (m===-1) m = findWin(myMark);
      if (m===-1 && !board[4]) m = 4;
      if (m===-1) { const f=board.map((v,i)=>v?-1:i).filter(i=>i>=0); m=f[Math.floor(Math.random()*f.length)]; }
      board[m] = op; myTurn = true;
      window.BearSound && BearSound.tap();
      renderBoard(); updateStatus();
      const r = checkWin(); if (r) endGame(r, myMark);
    }
    function findWin(mark) {
      for (const [a,b,c] of WINS) {
        const l=[board[a],board[b],board[c]];
        if (l.filter(v=>v===mark).length===2 && l.includes(''))
          return [a,b,c][l.indexOf('')];
      }
      return -1;
    }

    /* === ОНЛАЙН (MQTT) === */
    async function createRoom() {
      mode = 'online'; myMark = 'X'; myTurn = true;
      const code = BearMP.generateCode();
      setConnStatus('Подключаюсь к серверу...', 'wait');
      try {
        await BearMP.connect(code, 'host', handleMsg);
        document.getElementById('lobby').innerHTML = `
          <h2>🏠 КОМНАТА СОЗДАНА</h2>
          <p>Скажи другу эти цифры:</p>
          <div class="code-display">${code}</div>
          <p class="waiting">Ожидание игрока 2...</p>
          <div class="conn-status conn-ok">✅ Подключено к серверу</div>
          <p style="color:#888;font-size:.85rem;margin-top:10px">Друг вводит эти цифры и нажимает «Подключиться»</p>
        `;
      } catch (e) {
        setConnStatus('❌ ' + e.message, 'err');
      }
    }

    async function joinRoom() {
      const code = document.getElementById('joinCode').value.trim();
      if (!code || code.length < 4) { alert('Введи 4 цифры!'); return; }
      mode = 'online'; myMark = 'O'; myTurn = false;
      setConnStatus('Подключаюсь...', 'wait');
      try {
        await BearMP.connect(code, 'guest', handleMsg);
        BearMP.send({ type: 'join' });
        setConnStatus('✅ Подключено! Начинаем...', 'ok');
        showGame();
      } catch (e) {
        setConnStatus('❌ ' + e.message, 'err');
      }
    }

    function handleMsg(data) {
      if (data.type === 'join') { showGame(); }
      if (data.type === 'move') { receiveMove(data.index); }
      if (data.type === 'rematch') {
        board = Array(9).fill(''); gameOver = false; currentMark = 'X';
        document.getElementById('winModal').classList.remove('show');
        myTurn = myMark === 'X';
        renderBoard(); updateStatus();
      }
    }

    /* === ЛОКАЛЬНЫЙ (Hot Seat) === */
    function startLocal() { mode = 'local'; currentMark = 'X'; showGame(); }
    function startBot() { mode = 'bot'; myMark = 'X'; myTurn = true; showGame(); }

    /* Звук */
    function refreshSoundBtns(){const s=window.BearSound;if(!s)return;document.getElementById('sfxBtn').classList.toggle('off',!s.sfxEnabled);document.getElementById('sfxBtn').textContent=s.sfxEnabled?'🔊':'🔇';document.getElementById('musBtn').classList.toggle('off',!s.musicEnabled);document.getElementById('musBtn').textContent=s.musicEnabled?'🎵':'🎶'}
    document.getElementById('sfxBtn').addEventListener('click',()=>{BearSound.toggleSfx();refreshSoundBtns()});
    document.getElementById('musBtn').addEventListener('click',()=>{BearSound.toggleMusic();refreshSoundBtns()});
    window.addEventListener('load',()=>setTimeout(refreshSoundBtns,100));
  </script>
</body>
</html>
