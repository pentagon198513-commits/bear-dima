<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FF6B00" />
  <title>🃏 Найди пары — Медведь</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon-180.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game.css" />
  <script src="sounds.js?v=4" defer></script>
  <style>
    .memory-grid {
      display: grid;
      gap: clamp(6px, 2vw, 14px);
      width: min(95vw, 700px);
      padding: 10px;
    }
    /* 3×4 на мобильном, 4×3 на планшете и выше */
    @media (max-width: 600px) {
      .memory-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 601px) {
      .memory-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .card {
      aspect-ratio: 1 / 1;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
    }
    .card-inner {
      position: absolute;
      inset: 0;
      transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }
    .card-back {
      background:
        repeating-linear-gradient(45deg, #e11d48 0 14px, #b71c1c 14px 28px);
      border: 4px solid #fff;
      position: relative;
    }
    .card-back::after {
      content: '🐻';
      font-size: clamp(2rem, 10vw, 4rem);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
    }
    .card-front {
      background: #fff;
      border: 4px solid var(--hw-yellow);
      transform: rotateY(180deg);
    }
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card.matched .card-front {
      border-color: var(--mt-green);
      box-shadow: 0 0 16px var(--mt-green), inset 0 0 12px rgba(57, 255, 20, 0.3);
      animation: matched-pulse 0.8s;
    }
    @keyframes matched-pulse {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50%      { transform: rotateY(180deg) scale(1.08); }
    }
  </style>
</head>
<body>
  <header class="game-header">
    <a href="../" class="back-btn" aria-label="Назад на главную">
      <span>←</span><span>НАЗАД</span>
    </a>
    <h1 class="game-title">🃏 НАЙДИ ПАРЫ</h1>
    <div class="game-stats">
      <div class="stat-pill">🎯 <span id="moves">0</span></div>
      <div class="stat-pill">⏱ <span id="timer">0с</span></div>
    </div>
    <div class="sound-toggles">
      <button class="sound-btn" id="sfxBtn" aria-label="Звук" title="Звук">🔊</button>
      <button class="sound-btn" id="musBtn" aria-label="Музыка" title="Музыка">🎵</button>
    </div>
  </header>

  <main class="game-area">
    <div class="memory-grid" id="grid"></div>
  </main>

  <div class="win-modal" id="winModal">
    <div class="win-box">
      <h2 class="win-title">🏆 ПОБЕДА!</h2>
      <div class="win-stat">Ходов: <span id="winMoves">0</span></div>
      <div class="win-stat">Время: <span id="winTime">0с</span></div>
      <button class="win-btn" onclick="startGame()">🔁 ЕЩЁ РАЗ</button>
      <br />
      <a href="../" class="win-btn" style="margin-top:10px;">🏠 ДОМОЙ</a>
    </div>
  </div>

  <script>
    const IMAGES = [
      'bone_shaker', 'twin_mill', 'deora_ii',
      'gazella_gt', 'dragon_blaster', 'earthshaker'
    ];

    const grid = document.getElementById('grid');
    const movesEl = document.getElementById('moves');
    const timerEl = document.getElementById('timer');
    const winModal = document.getElementById('winModal');
    const winMovesEl = document.getElementById('winMoves');
    const winTimeEl = document.getElementById('winTime');

    let first = null;
    let second = null;
    let lock = false;
    let matched = 0;
    let moves = 0;
    let seconds = 0;
    let timerId = null;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function startGame() {
      // reset
      first = second = null;
      lock = false;
      matched = 0;
      moves = 0;
      seconds = 0;
      movesEl.textContent = '0';
      timerEl.textContent = '0с';
      winModal.classList.remove('show');
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        seconds++;
        timerEl.textContent = seconds + 'с';
      }, 1000);

      grid.innerHTML = '';
      const deck = shuffle([...IMAGES, ...IMAGES]);
      deck.forEach((name) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.name = name;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">
              <img src="../img/cars/${name}.jpg" alt="${name}" />
            </div>
          </div>
        `;
        card.addEventListener('click', () => flip(card));
        grid.appendChild(card);
      });
    }

    function flip(card) {
      if (lock) return;
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
      card.classList.add('flipped');
      window.BearSound && BearSound.click();
      if (!first) {
        first = card;
        return;
      }
      second = card;
      lock = true;
      moves++;
      movesEl.textContent = moves;
      if (first.dataset.name === second.dataset.name) {
        first.classList.add('matched');
        second.classList.add('matched');
        matched++;
        window.BearSound && BearSound.match();
        reset();
        if (matched === IMAGES.length) winGame();
      } else {
        setTimeout(() => {
          first.classList.remove('flipped');
          second.classList.remove('flipped');
          reset();
        }, 900);
      }
    }

    function reset() {
      first = second = null;
      lock = false;
    }

    function winGame() {
      clearInterval(timerId);
      winMovesEl.textContent = moves;
      winTimeEl.textContent = seconds + 'с';
      window.BearSound && BearSound.win();
      setTimeout(() => winModal.classList.add('show'), 500);
    }

    /* Кнопки звука/музыки */
    function refreshSoundBtns() {
      const s = window.BearSound;
      if (!s) return;
      document.getElementById('sfxBtn').classList.toggle('off', !s.sfxEnabled);
      document.getElementById('sfxBtn').textContent = s.sfxEnabled ? '🔊' : '🔇';
      document.getElementById('musBtn').classList.toggle('off', !s.musicEnabled);
      document.getElementById('musBtn').textContent = s.musicEnabled ? '🎵' : '🎶';
    }
    document.getElementById('sfxBtn').addEventListener('click', () => {
      BearSound.toggleSfx(); refreshSoundBtns();
    });
    document.getElementById('musBtn').addEventListener('click', () => {
      BearSound.toggleMusic(); refreshSoundBtns();
    });
    window.addEventListener('load', () => { setTimeout(refreshSoundBtns, 100); });

    // Пауза таймера при скрытии вкладки
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (timerId) { clearInterval(timerId); timerId = null; }
      } else if (!winModal.classList.contains('show') && matched < IMAGES.length) {
        if (!timerId) {
          timerId = setInterval(() => { seconds++; timerEl.textContent = seconds + 'с'; }, 1000);
        }
      }
    });

    startGame();
  </script>
</body>
</html>
